# Nginx site — osrm-routing.vuatho.com behind Cloudflare proxy (SSL at edge)
# Origin listens HTTP :80 (Flexible or Full CF → origin HTTP)
# For Full (Strict): add Cloudflare Origin Certificate on :443 (see CLOUDFLARE.md)

server {
    listen 80;
    listen [::]:80;
    server_name osrm-routing.vuatho.com;

    client_max_body_size 1m;

    # Cloudflare sends X-Forwarded-Proto: https when visitor uses HTTPS
    set $forwarded_proto $http_x_forwarded_proto;
    if ($forwarded_proto = "") {
        set $forwarded_proto $scheme;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /api/geocode {
        limit_req zone=routing_geocode burst=16 nodelay;
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        limit_req zone=routing_api burst=80 nodelay;
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
        add_header Cache-Control "no-store" always;
    }

    location /health {
        access_log off;
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
    }

    location / {
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
        # Playground HTML — short cache OK at CF if needed; API must never cache
        add_header Cache-Control "no-store" always;
    }
}
