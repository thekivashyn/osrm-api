# Production nginx — osrm-routing.vuatho.com
# Install: /etc/nginx/sites-available/routing-api

limit_req_zone $binary_remote_addr zone=routing_api:10m rate=40r/s;
limit_req_zone $binary_remote_addr zone=routing_geocode:10m rate=8r/s;

upstream routing_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name osrm-routing.vuatho.com;

    client_max_body_size 1m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = /api/system-status {
        return 404;
        add_header Cache-Control "no-store" always;
    }

    location /api/geocode {
        limit_req zone=routing_geocode burst=16 nodelay;
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
    }

    location /api/ {
        limit_req zone=routing_api burst=80 nodelay;
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
    }

    location /health {
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
    }

    location / {
        proxy_pass http://routing_api;
        include /etc/nginx/snippets/routing-proxy.conf;
    }
}
