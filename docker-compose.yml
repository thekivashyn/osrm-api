services:
  osrm:
    image: osrm/osrm-backend:latest
    platform: linux/amd64
    container_name: osrm
    volumes:
      - ./data:/data
      - ./docker/osrm-entrypoint.sh:/entrypoint.sh:ro
      - ./docker/car-vietnam.lua:/profiles/car-vietnam.lua:ro
      - ./docker/motorbike-vietnam.lua:/profiles/motorbike-vietnam.lua:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      OSRM_THREADS: "2"
    ports:
      - "127.0.0.1:5050:5000"
      - "127.0.0.1:5051:5001"
    restart: unless-stopped
    healthcheck:
      # Image has no pgrep/curl — bash TCP probe against both routers.
      test: ["CMD", "bash", "-c", "(exec 3<>/dev/tcp/127.0.0.1/5000) && (exec 3<>/dev/tcp/127.0.0.1/5001)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s
