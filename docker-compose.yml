services:
  osrm:
    image: osrm/osrm-backend:latest
    platform: linux/amd64
    container_name: osrm
    volumes:
      - ./data:/data
      - ./docker/osrm-entrypoint.sh:/entrypoint.sh:ro
      - ./docker/car-vietnam.lua:/profiles/car-vietnam.lua:ro
      - ./docker/motorbike-vietnam.lua:/profiles/motorbike-vietnam.lua:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5050:5000"
      - "5051:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x osrm-routed || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: nominatim
    ports:
      - "9091:8080"
    environment:
      PBF_PATH: /nominatim/data/vietnam-latest.osm.pbf
      IMPORT_WIKIPEDIA: "false"
      NOMINATIM_PASSWORD: nominatim
      REPLICATION_URL: https://download.geofabrik.de/asia/vietnam-updates/
    volumes:
      - nominatim-db:/var/lib/postgresql/14/main
      - ./data:/nominatim/data
    shm_size: 2gb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/status | grep -q OK"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 7200s

volumes:
  nominatim-db:
